<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ TLDR — Vicharanashala Internship Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f8fafc; color: #1e293b; line-height: 1.5;
    padding: 24px; display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }
  .container { max-width: 840px; width: 100%; }

  /* ── Header ── */
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header h1 .chip { background: #fbbf24; color: #1e293b; font-size: .65rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .header p { color: #64748b; font-size: .88rem; margin-top: 4px; }

  /* ── Stats ── */
  .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 110px; background: #fff; border-radius: 14px; padding: 16px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #e2e8f0;
  }
  .stat-card .num { font-size: 1.7rem; font-weight: 800; line-height: 1.1; }
  .stat-card .label { font-size: .7rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
  .stat-card.total .num { color: #1e293b; }
  .stat-card.needs .num { color: #ef4444; }
  .stat-card.done .num { color: #10b981; }

  /* ── Search + Filter Bar ── */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: stretch; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input {
    width: 100%; padding: 11px 14px 11px 38px; border-radius: 12px;
    border: 1px solid #e2e8f0; background: #fff; font-size: .85rem;
    outline: none; transition: border-color .2s, box-shadow .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); height: 100%;
  }
  .search-wrap input:focus { border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251,191,36,.15); }
  .search-wrap .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: #94a3b8; font-size: 1rem; pointer-events: none;
  }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 11px 16px; border-radius: 12px; border: 1px solid #e2e8f0;
    background: #fff; font-size: .75rem; font-weight: 600; color: #64748b;
    cursor: pointer; transition: all .15s; white-space: nowrap;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .filter-btn:hover { background: #f8fafc; color: #334155; }
  .filter-btn.active { background: #1e293b; color: #fff; border-color: #1e293b; box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  .filter-btn .count { opacity: .6; font-weight: 400; }

  .result-meta { font-size: .78rem; color: #64748b; margin-bottom: 12px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
  .result-meta .highlight { color: #f59e0b; font-weight: 700; }

  /* ── FAQ Cards ── */
  .faq-item {
    background: #fff; border-radius: 16px; margin-bottom: 10px;
    border: 1px solid #e2e8f0; overflow: hidden;
    transition: box-shadow .2s, border-color .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .faq-item:hover { border-color: #cbd5e1; box-shadow: 0 4px 14px rgba(0,0,0,.06); }

  .faq-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; cursor: pointer; user-select: none;
    transition: background .12s; gap: 12px;
  }
  .faq-header:hover { background: #fafafa; }
  .faq-header-left { flex: 1; min-width: 0; }
  .faq-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
  .faq-id {
    font-size: .62rem; font-weight: 700; color: #94a3b8;
    background: #f1f5f9; padding: 1px 7px; border-radius: 4px;
    letter-spacing: .02em;
  }
  .faq-section {
    font-size: .64rem; color: #64748b; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: .58rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    letter-spacing: .01em; line-height: 1.3;
  }
  .badge-tldr { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
  .badge-needs { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .faq-question {
    font-size: .88rem; font-weight: 600; color: #0f172a; line-height: 1.4;
    padding-right: 4px;
  }
  .expand-icon {
    font-size: .8rem; color: #94a3b8; transition: transform .3s ease;
    flex-shrink: 0;
  }
  .faq-item.open .expand-icon { transform: rotate(180deg); }

  /* ── Collapsible Content ── */
  .faq-content { max-height: 0; overflow: hidden; transition: max-height .45s ease; }
  .faq-item.open .faq-content { max-height: 5000px; }
  .faq-inner { padding: 0 20px 20px; }

  /* ── TLDR Section (gold/yellow) ── */
  .tldr-section {
    background: #fffbeb; border-left: 4px solid #fbbf24; border-radius: 12px;
    padding: 18px 20px; margin-bottom: 18px;
  }
  .tldr-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }
  .tldr-header .tldr-icon { font-size: 1.2rem; }
  .tldr-header .tldr-title { font-size: .78rem; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: .04em; }

  .tldr-list { list-style: none; padding: 0; margin: 0 0 10px; }
  .tldr-list li {
    position: relative; padding: 5px 0 5px 26px; font-size: .84rem; color: #1e293b; line-height: 1.5;
  }
  .tldr-list li::before {
    content: "✓"; position: absolute; left: 2px; top: 5px;
    color: #10b981; font-weight: 700; font-size: .9rem;
  }

  .tldr-bullets { list-style: none; padding: 0; margin: 0 0 10px; }
  .tldr-bullets li { padding: 4px 0 4px 18px; font-size: .84rem; color: #1e293b; position: relative; }
  .tldr-bullets li::before { content: "•"; position: absolute; left: 0; color: #fbbf24; font-weight: 700; }

  .tldr-quick-answer { font-size: .95rem; font-weight: 600; color: #1e293b; padding: 4px 0 10px; }
  .tldr-short-answer { font-size: .88rem; color: #334155; padding: 4px 0 8px; font-weight: 500; }
  .tldr-label {
    font-size: .68rem; font-weight: 700; color: #64748b; text-transform: uppercase;
    letter-spacing: .03em; margin: 8px 0 4px;
  }
  .tldr-label-sm { font-size: .66rem; color: #92400e; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; margin: 6px 0 3px; }

  /* Warning box: red */
  .tldr-warning {
    background: #fef2f2; border: 1px solid #fecaca; border-left: 4px solid #ef4444; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 8px; font-size: .82rem; color: #991b1b;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .tldr-warning .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .tldr-warning strong { font-weight: 700; }

  /* Note box: blue */
  .tldr-note {
    background: #eff6ff; border: 1px solid #bfdbfe; border-left: 4px solid #3b82f6; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 8px; font-size: .82rem; color: #1e40af;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .tldr-note .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  .tldr-inline { padding: 3px 0; font-size: .82rem; color: #92400e; display: flex; gap: 6px; align-items: flex-start; }
  .tldr-inline .icon { font-size: .9rem; flex-shrink: 0; }

  /* ── Full Answer ── */
  .full-answer-header {
    font-size: .72rem; font-weight: 700; color: #64748b; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .full-answer-text {
    font-size: .84rem; color: #334155; line-height: 1.7; white-space: pre-wrap;
  }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
  .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }
  .empty-state p { font-size: .88rem; color: #64748b; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 70px 20px; color: #94a3b8; font-size: .9rem; }
  .loading .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #fbbf24; border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .stats { gap: 8px; }
    .stat-card { padding: 12px 14px; }
    .stat-card .num { font-size: 1.3rem; }
    .stat-card .label { font-size: .6rem; }
    .faq-header { padding: 12px 14px; }
    .faq-inner { padding: 0 14px 14px; }
    .tldr-section { padding: 14px 14px; }
    .header h1 { font-size: 1.3rem; }
    .toolbar { flex-direction: column; }
    .filter-group { width: 100%; }
    .filter-btn { flex: 1; text-align: center; padding: 10px 8px; font-size: .7rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">

// ─── TLDR Detection ──────────────────────────────────────────
function needsTLDR(faq) {
  const actionKeywords = ['how do i','how to','what should i','when do i','can i','do i need','submit','upload','download','register','sign','confirm','accept'];
  const isLong = faq.answer.length > 400;
  const isActionOriented = actionKeywords.some(kw => faq.question.toLowerCase().includes(kw));
  const hasMultipleSteps = (faq.answer.match(/\./g) || []).length > 8;
  return isLong || (isActionOriented && hasMultipleSteps);
}

function autoGenerateTLDR(faq) {
  const s = faq.answer;
  const lines = s.split('\n').filter(l => l.trim()).map(l => l.trim());
  const steps = lines.filter(l => /^\d+[\.\)]/.test(l) || /^[-•]/.test(l) || /^(step|click|open|go to|select|enter|type|choose|download|upload)/i.test(l));
  if (steps.length > 1) return { steps: steps.slice(0, 5) };
  const sentences = s.match(/[^.!?]+[.!?]+/g) || [s];
  const summary = sentences.slice(0, 2).join(' ').trim();
  return summary.length > 40 ? { short_answer: summary } : null;
}

function enhanceFAQs(faqs) {
  return faqs.map(faq => {
    const needs = needsTLDR(faq);
    const enhanced = { ...faq, needs_tldr: needs, answer_length: faq.answer.length };
    if (TLDR_TEMPLATES[faq.id]) {
      enhanced.tldr = TLDR_TEMPLATES[faq.id];
    } else if (needs) {
      const gen = autoGenerateTLDR(faq);
      if (gen) enhanced.tldr = gen;
    }
    return enhanced;
  });
}

// ─── Render TLDR Section ─────────────────────────────────────
function renderTLDR(t) {
  let html = '<div class="tldr-section"><div class="tldr-header"><span class="tldr-icon">⚡</span><span class="tldr-title">TLDR — Quick Action</span></div>';

  // Steps
  if (t.steps) {
    html += '<ul class="tldr-list">';
    t.steps.forEach(s => { html += `<li>${s}</li>`; });
    html += '</ul>';
  }

  // Quick fixes
  if (t.quick_fixes) {
    html += '<div class="tldr-label">🔧 Quick Fixes — Try in order</div><ul class="tldr-list">';
    t.quick_fixes.forEach(f => { html += `<li>${f}</li>`; });
    html += '</ul>';
    if (t.if_broken) html += `<div class="tldr-note"><span class="icon">💡</span><span><strong>If still broken:</strong> ${t.if_broken}</span></div>`;
  }

  // Quick answer
  if (t.quick_answer) html += `<div class="tldr-quick-answer">📅 ${t.quick_answer}</div>`;
  if (t.short_answer) html += `<div class="tldr-short-answer">🎯 ${t.short_answer}</div>`;

  // Duration
  if (t.duration) html += `<div class="tldr-inline"><span class="icon">⏱️</span><span><strong>Duration:</strong> ${t.duration}</span></div>`;
  if (t.recommendation) html += `<div class="tldr-inline"><span class="icon">🎯</span><span><strong>RECOMMENDED:</strong> ${t.recommendation}</span></div>`;
  if (t.can_change) html += `<div class="tldr-inline"><span class="icon">🎯</span><span><strong>Can you change?</strong> ${t.can_change}</span></div>`;
  if (t.location) html += `<div class="tldr-inline"><span class="icon">📥</span><span><strong>Location:</strong> ${t.location}</span></div>`;
  if (t.after_approval) html += `<div class="tldr-inline"><span class="icon">✅</span><span><strong>After approval:</strong> ${t.after_approval}</span></div>`;
  if (t.confirmation) html += `<div class="tldr-inline"><span class="icon">✅</span><span><strong>Confirmation:</strong> ${t.confirmation}</span></div>`;

  // Benefits
  if (t.benefits) {
    html += '<div class="tldr-label">✅ Why start early?</div><ul class="tldr-bullets">';
    t.benefits.forEach(b => { html += `<li>${b}</li>`; });
    html += '</ul>';
  }

  // Paths
  if (t.paths) {
    html += '<div class="tldr-label">📍 Paths to offer letter</div><ul class="tldr-list">';
    t.paths.forEach(p => { html += `<li>${p}</li>`; });
    html += '</ul>';
  }

  // Phases
  if (t.phases) {
    html += '<div class="tldr-label">📊 Internship Phases</div><ul class="tldr-list">';
    t.phases.forEach(p => { html += `<li>${p}</li>`; });
    html += '</ul>';
  }

  // Official channels
  if (t.official_channels) {
    html += '<div class="tldr-label">✅ Official channels ONLY</div><ul class="tldr-bullets">';
    t.official_channels.forEach(c => { html += `<li>${c}</li>`; });
    html += '</ul>';
  }

  // Internship courses
  if (t.internship_courses) {
    html += '<div class="tldr-label">📚 INTERNSHIP COURSES</div><ul class="tldr-list">';
    t.internship_courses.forEach(c => { html += `<li>${c}</li>`; });
    html += '</ul>';
  }
  if (t.iitm_courses) html += `<div class="tldr-note"><span class="icon">🎓</span><span><strong>IITM BS COURSES:</strong> ${t.iitm_courses}</span></div>`;
  if (t.how_to_tell) html += `<div class="tldr-note"><span class="icon">💡</span><span><strong>How to tell which rules apply:</strong> ${t.how_to_tell}</span></div>`;

  // Warnings (red box)
  if (t.warning) html += `<div class="tldr-warning"><span class="icon">⚠️</span><span><strong>CRITICAL:</strong> ${t.warning}</span></div>`;
  if (t.consequences) html += `<div class="tldr-warning"><span class="icon">⚠️</span><span><strong>Consequences:</strong> ${t.consequences}</span></div>`;

  // Notes (blue box) + inline items
  if (t.note) html += `<div class="tldr-note"><span class="icon">💡</span><span><strong>Pro Tip:</strong> ${t.note}</span></div>`;
  if (t.timeline) html += `<div class="tldr-note"><span class="icon">⏱️</span><span><strong>Timeline:</strong> ${t.timeline}</span></div>`;
  if (t.alternative) html += `<div class="tldr-note"><span class="icon">🔄</span><span><strong>Alternative:</strong> ${t.alternative}</span></div>`;
  if (t.rule) html += `<div class="tldr-note"><span class="icon">💡</span><span><strong>Simple Rule:</strong> ${t.rule}</span></div>`;
  if (t.escalate) html += `<div class="tldr-note"><span class="icon">🆘</span><span><strong>Need help?</strong> ${t.escalate}</span></div>`;
  if (t.to_complete) html += `<div class="tldr-note"><span class="icon">✅</span><span><strong>To complete:</strong> ${t.to_complete}</span></div>`;
  if (t.extras) html += `<div class="tldr-note"><span class="icon">💡</span><span><strong>Note:</strong> ${t.extras}</span></div>`;

  html += '</div>';
  return html;
}

// ─── Render FAQ Card ─────────────────────────────────────────
function renderFAQ(faq) {
  const badges = [];
  if (faq.tldr) badges.push('<span class="badge badge-tldr">⚡ HAS TLDR</span>');
  else if (faq.needs_tldr) badges.push('<span class="badge badge-needs">📝 NEEDS TLDR</span>');

  const tldrHTML = faq.tldr ? renderTLDR(faq.tldr) : '';

  return `
    <div class="faq-item" data-id="${faq.id}">
      <div class="faq-header" onclick="toggleFAQ(this)">
        <div class="faq-header-left">
          <div class="faq-meta">
            <span class="faq-id">${faq.id}</span>
            <span class="faq-section">📂 ${faq.section}</span>
            ${badges.join(' ')}
          </div>
          <div class="faq-question">${faq.question}</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="faq-content">
        <div class="faq-inner">
          ${tldrHTML}
          <div class="full-answer-header">📄 Full Answer (Original)</div>
          <div class="full-answer-text">${faq.answer}</div>
        </div>
      </div>
    </div>
  `;
}

function toggleFAQ(el) {
  const item = el.closest('.faq-item');
  if (item.classList.contains('open')) {
    item.classList.remove('open');
  } else {
    document.querySelectorAll('.faq-item.open').forEach(e => e.classList.remove('open'));
    item.classList.add('open');
  }
}

// ─── State ───────────────────────────────────────────────────
let allFAQs = [];
let filteredFAQs = [];
let currentFilter = 'all';
let searchTimeout = null;

// ─── Update UI ──────────────────────────────────────────────
function updateStats(faqs) {
  const total = allFAQs.length;
  const needs = allFAQs.filter(f => f.needs_tldr).length;
  const done = allFAQs.filter(f => f.tldr).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card total"><div class="num">${total}</div><div class="label">Total FAQs</div></div>
    <div class="stat-card needs"><div class="num">${needs}</div><div class="label">Need TLDR</div></div>
    <div class="stat-card done"><div class="num">${done}</div><div class="label">With TLDR</div></div>
  `;
  document.getElementById('countAll').textContent = total;
  document.getElementById('countTLDR').textContent = done;
  document.getElementById('countNeeds').textContent = needs;
}

function updateResultMeta(faqs) {
  const el = document.getElementById('resultMeta');
  if (faqs.length === allFAQs.length) {
    el.innerHTML = `<span>Showing <span class="highlight">all ${allFAQs.length}</span> FAQs</span>`;
  } else {
    el.innerHTML = `<span>Showing <span class="highlight">${faqs.length}</span> of ${allFAQs.length} FAQs</span>`;
  }
}

function renderFiltered() {
  const container = document.getElementById('faqList');
  if (!filteredFAQs.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No FAQs match your current search or filter.</p></div>';
    return;
  }
  container.innerHTML = filteredFAQs.map(f => renderFAQ(f)).join('');
  updateResultMeta(filteredFAQs);
}

function applyFilters() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();

  let list = [...allFAQs];

  // Apply filter mode
  if (currentFilter === 'tldr') {
    list = list.filter(f => f.tldr);
  } else if (currentFilter === 'needs') {
    list = list.filter(f => f.needs_tldr && !f.tldr);
  }

  // Apply search
  if (term) {
    list = list.filter(f =>
      f.question.toLowerCase().includes(term) ||
      f.answer.toLowerCase().includes(term) ||
      f.section.toLowerCase().includes(term) ||
      f.id.toLowerCase().includes(term)
    );
  }

  filteredFAQs = list;
  renderFiltered();
}

function handleSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 300);
}

function setFilter(mode) {
  currentFilter = mode;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === mode);
  });
  applyFilters();
}

// ─── Init ────────────────────────────────────────────────────
async function init() {
  document.getElementById('faqList').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading 126 FAQs...</div>';
  try {
    const res = await fetch('faq.json');
    const faqs = await res.json();
    allFAQs = enhanceFAQs(faqs);
    filteredFAQs = [...allFAQs];

    // Verify detection
    const detected = allFAQs.filter(f => f.needs_tldr).length;
    const withTLDR = allFAQs.filter(f => f.tldr).length;
    console.log(`TLDR Detection: ${detected}/126 flagged as needing TLDR`);
    console.log(`TLDR Templates: ${withTLDR}/126 have TLDR content`);

    updateStats(allFAQs);
    renderFiltered();

    document.getElementById('searchInput').addEventListener('input', handleSearch);
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });
  } catch (err) {
    document.getElementById('faqList').innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>Failed to load FAQs: ${err.message}.<br>Make sure faq.json is in the same folder.</p></div>`;
  }
}

init();
</script>
</body>
</html>
